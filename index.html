<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Terminal v9.0 — Data Downloader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap');

:root{
  --bg0:#06080d;--bg1:#0a0d16;--bg2:#0f1320;--bg3:#141929;--bg4:#1a2033;
  --border:#182030;--border2:#1f2d42;--border3:#2a3d58;
  --accent:#00d4ff;--accent3:#00ff9d;--accent5:#b57cf7;
  --text0:#dce8f5;--text1:#8fa3bf;--text2:#4a5a72;--text3:#2a3545;
  --green:#00d68f;--red:#ff4455;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg0);color:var(--text0);min-height:100vh;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}

/* Keep only the parts needed for downloader - simplified but still nice */
#app{display:block}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:rgba(10,13,22,0.95)}
.logo-name{font-size:19px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(90deg,var(--accent),var(--accent5));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.screen{padding:28px 24px 80px;max-width:1100px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-bottom:13px}
.multi-list{background:var(--bg3);border:1px solid var(--border);border-radius:8px;max-height:220px;overflow-y:auto;padding:4px}
.multi-item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:6px;cursor:pointer}
.multi-item.selected{background:rgba(0,212,255,0.07)}
.tf-chip{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text1);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer}
.tf-chip.active{border-color:var(--accent);background:rgba(0,212,255,0.09);color:var(--accent)}
.submit-btn{width:100%;padding:15px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent5));color:#000;font-weight:800;cursor:pointer;font-size:15px}
.submit-btn:disabled{opacity:0.5}
.progress-bar-bg{background:var(--bg3);border:1px solid var(--border);border-radius:5px;height:6px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent5));width:0%;transition:width .3s}
.dl-file{display:flex;justify-content:space-between;padding:10px;background:var(--bg4);border-radius:7px;margin-bottom:6px}
.dl-btn{padding:6px 14px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:5px;cursor:pointer}
</style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <div class="logo-name">LUMA DATA DOWNLOADER</div>
  </div>

  <div id="screen-ohlc" class="screen">
    <div class="card">
      <div class="card-title">SELECT CRYPTOCURRENCIES</div>
      <input class="search-input" id="crypto-search" placeholder="Search coin..." oninput="filterList('crypto')">
      <div style="display:flex;gap:8px;margin-bottom:7px">
        <button onclick="selectAll('crypto',true)">☑ All</button>
        <button onclick="selectAll('crypto',false)">☐ None</button>
      </div>
      <div class="multi-list" id="crypto-list"></div>
    </div>

    <div class="card">
      <div class="card-title">TIMEFRAMES</div>
      <div class="tf-chips" id="tf-chips"></div>
    </div>

    <div class="card">
      <div class="card-title">HISTORY RANGE (weeks back)</div>
      <input type="range" id="weeks-slider" min="1" max="260" value="52" oninput="document.getElementById('weeks-label').innerText=this.value+' weeks'">
      <div id="weeks-label" style="text-align:center;margin-top:8px">52 weeks</div>
    </div>

    <button class="submit-btn" onclick="startDownload()">⬇ DOWNLOAD REAL OHLC DATA</button>

    <div id="progress-wrap" style="display:none;margin-top:20px">
      <div style="margin-bottom:8px">Downloading...</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar"></div></div>
    </div>

    <div id="dl-area" style="display:none;margin-top:20px">
      <div id="dl-file-list"></div>
    </div>
  </div>
</div>

<script>
// ====================== CRYPTO LIST ======================
const CRYPTO = [
  {sym:'BTCUSDT',label:'BTC'},{sym:'ETHUSDT',label:'ETH'},{sym:'SOLUSDT',label:'SOL'},
  {sym:'XRPUSDT',label:'XRP'},{sym:'BNBUSDT',label:'BNB'},{sym:'DOGEUSDT',label:'DOGE'},
  {sym:'ADAUSDT',label:'ADA'},{sym:'AVAXUSDT',label:'AVAX'},{sym:'LINKUSDT',label:'LINK'}
];

let selCrypto = new Set(['BTCUSDT']);
let selTFs = new Set(['1h']);

// Render list
function renderCrypto() {
  const el = document.getElementById('crypto-list');
  el.innerHTML = '';
  CRYPTO.forEach(c => {
    const div = document.createElement('div');
    div.className = 'multi-item' + (selCrypto.has(c.sym) ? ' selected' : '');
    div.innerHTML = `<input type="checkbox" ${selCrypto.has(c.sym)?'checked':''}> <span style="font-weight:600">${c.label}</span>`;
    div.onclick = () => {
      if (selCrypto.has(c.sym)) selCrypto.delete(c.sym);
      else selCrypto.add(c.sym);
      renderCrypto();
    };
    el.appendChild(div);
  });
}

// Render timeframes
function renderTFChips() {
  const el = document.getElementById('tf-chips');
  ['1m','5m','15m','30m','1h','4h','1d'].forEach(tf => {
    const b = document.createElement('button');
    b.className = 'tf-chip' + (selTFs.has(tf) ? ' active' : '');
    b.textContent = tf;
    b.onclick = () => {
      if (selTFs.has(tf)) selTFs.delete(tf);
      else selTFs.add(tf);
      b.classList.toggle('active');
    };
    el.appendChild(b);
  });
}

function selectAll(t, v) {
  if (t === 'crypto') {
    if (v) CRYPTO.forEach(c => selCrypto.add(c.sym));
    else selCrypto.clear();
    renderCrypto();
  }
}

function filterList() {
  // simple search not needed for now
}

// ====================== DOWNLOAD ======================
async function startDownload() {
  if (selCrypto.size === 0) {
    alert("Please select at least one coin");
    return;
  }

  const tasks = [];
  selCrypto.forEach(sym => {
    selTFs.forEach(tf => tasks.push({sym, tf}));
  });

  document.getElementById('progress-wrap').style.display = 'block';
  const progBar = document.getElementById('prog-bar');

  for (let i = 0; i < tasks.length; i++) {
    const t = tasks[i];
    progBar.style.width = Math.round(((i+1)/tasks.length)*100) + '%';

    let csv = '';
    try {
      csv = await fetchRealBinance(t.sym, t.tf);
    } catch (e) {
      console.error(e);
      alert("Failed to fetch " + t.sym + " " + t.tf + " — try again in a minute");
      return;
    }

    const filename = t.sym.replace('USDT','') + '_' + t.tf + '_OHLC.csv';
    downloadFile(filename, csv);
  }

  alert("✅ All files downloaded successfully!");
  document.getElementById('progress-wrap').style.display = 'none';
}

async function fetchRealBinance(sym, tf) {
  const intervalMap = {'1m':'1m','5m':'5m','15m':'15m','30m':'30m','1h':'1h','4h':'4h','1d':'1d'};
  const interval = intervalMap[tf] || '1h';

  const url = `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${interval}&limit=1000`;
  const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

  const r = await fetch(proxy);
  if (!r.ok) throw new Error("Proxy error");

  const data = await r.json();
  if (!data || data.length === 0) throw new Error("No data from Binance");

  // Build clean CSV
  let csv = "datetime,open,high,low,close,volume\n";
  data.forEach(c => {
    const dt = new Date(c[0]).toISOString().replace('T',' ').slice(0,19);
    csv += `${dt},${c[1]},${c[2]},${c[3]},${c[4]},${c[5]}\n`;
  });
  return csv;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// Init
window.onload = () => {
  renderCrypto();
  renderTFChips();
};
</script>
</body>
</html>
